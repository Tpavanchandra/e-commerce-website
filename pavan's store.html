<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAVAN'S STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f4;--bg2:#ffffff;--bg3:#f2ede6;--bg4:#ece6dd;
  --text:#1a1510;--text2:#6b5f50;--text3:#a89880;
  --gold:#9a6f2e;--gold2:#7a5520;--gold3:#c8a96e;
  --border:#e4ddd2;--border2:#d4cbbf;
  --success:#2d7a48;--danger:#c0392b;
  --r:8px;--r2:14px;--r3:999px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}

/* CURSOR TRAIL */
.cursor-dot{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--gold);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:opacity 0.3s;mix-blend-mode:multiply}
.cursor-ring{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid rgba(154,111,46,0.35);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform 0.12s ease,width 0.2s,height 0.2s,border-color 0.2s}

/* PARTICLES CANVAS */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.55}

/* LAYOUT */
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{position:sticky;top:0;z-index:200;height:64px;display:flex;align-items:center;padding:0 2.5rem;gap:1rem;
  border-bottom:1px solid var(--border);
  background:rgba(250,248,244,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px)}
nav::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:navLine 3s ease-in-out infinite}
@keyframes navLine{0%{width:0;left:0}50%{width:100%;left:0}51%{width:100%;left:0}100%{width:0;left:100%}}

.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:0.15em;cursor:pointer;flex-shrink:0;
  animation:logoGlow 4s ease-in-out infinite alternate}
@keyframes logoGlow{from{text-shadow:0 0 0 transparent}to{text-shadow:0 0 20px rgba(154,111,46,0.25)}}
.logo span{color:var(--text2);font-weight:300}

.nav-links{display:flex;gap:4px;flex:1;justify-content:center}
.nav-link{background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;padding:6px 16px;border-radius:var(--r3);cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.nav-link::before{content:'';position:absolute;inset:0;background:rgba(154,111,46,0.07);transform:scaleX(0);transform-origin:left;transition:transform 0.3s ease;border-radius:var(--r3)}
.nav-link:hover::before,.nav-link.active::before{transform:scaleX(1)}
.nav-link:hover,.nav-link.active{color:var(--gold)}

.nav-cart{position:relative;background:none;border:1px solid var(--border2);color:var(--text2);width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all 0.25s;flex-shrink:0}
.nav-cart:hover{border-color:var(--gold);color:var(--gold);transform:scale(1.08)}
.cart-count{position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--bg);font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.cart-count.bump{animation:cartBump 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes cartBump{0%{transform:scale(1)}50%{transform:scale(1.6)}100%{transform:scale(1)}}

/* PAGES */
.page{animation:pageIn 0.45s cubic-bezier(0.22,1,0.36,1) both}
@keyframes pageIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{padding:6rem 2.5rem 5rem;text-align:center;position:relative;overflow:hidden;min-height:520px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(154,111,46,0.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbPulse 6s ease-in-out infinite}
@keyframes orbPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}}
.hero-ring{position:absolute;border-radius:50%;border:1px solid rgba(154,111,46,0.12);animation:ringExpand 4s ease-out infinite}
.hero-ring:nth-child(2){width:300px;height:300px;animation-delay:0s}
.hero-ring:nth-child(3){width:500px;height:500px;animation-delay:1s}
.hero-ring:nth-child(4){width:700px;height:700px;animation-delay:2s}
@keyframes ringExpand{0%{opacity:0.6;transform:translate(-50%,-50%) scale(0.8)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}
.hero-ring{position:absolute;top:50%;left:50%}
.hero-eyebrow{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.25rem;
  animation:fadeSlideUp 0.8s 0.1s both}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,7vw,5rem);font-weight:700;line-height:1.05;margin-bottom:1.25rem;
  animation:fadeSlideUp 0.8s 0.2s both}
.hero-title em{color:var(--gold);font-style:italic}
.hero-sub{font-size:16px;color:var(--text2);max-width:440px;margin:0 auto 2.5rem;
  animation:fadeSlideUp 0.8s 0.3s both}
.hero-cta{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:var(--bg);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:14px 32px;border-radius:var(--r3);border:none;cursor:pointer;position:relative;overflow:hidden;
  animation:fadeSlideUp 0.8s 0.4s both;transition:transform 0.2s,box-shadow 0.2s}
.hero-cta::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);transition:left 0.5s}
.hero-cta:hover::after{left:100%}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(200,169,110,0.25)}
.hero-cta:active{transform:translateY(0)}

.hero-stats{display:flex;justify-content:center;gap:4rem;margin-top:4rem;padding-top:3rem;border-top:1px solid var(--border);
  animation:fadeSlideUp 0.8s 0.5s both}
.stat-num{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--gold);
  animation:countUp 1.5s 0.8s both}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stat-lbl{font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px}

@keyframes fadeSlideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* CATEGORY PILLS */
.cats-wrap{padding:0 2.5rem 2rem;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.cats-wrap::-webkit-scrollbar{display:none}
.cat-pill{background:var(--bg2);border:1px solid var(--border);color:var(--text3);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 20px;border-radius:var(--r3);cursor:pointer;white-space:nowrap;transition:all 0.25s;position:relative;overflow:hidden;flex-shrink:0}
.cat-pill::before{content:'';position:absolute;inset:0;background:rgba(200,169,110,0.1);transform:translateY(100%);transition:transform 0.3s ease}
.cat-pill:hover::before,.cat-pill.active::before{transform:translateY(0)}
.cat-pill:hover,.cat-pill.active{color:var(--gold);border-color:var(--gold3)}

/* SECTION TITLE */
.section-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;margin-bottom:1.5rem;display:flex;align-items:baseline;gap:12px}
.section-title .count{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text3);font-weight:400}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.5rem}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;
  transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1),border-color 0.25s;
  animation:cardIn 0.5s both}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.pcard:hover{transform:translateY(-6px) scale(1.01);border-color:var(--border2)}
.pcard-img{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:72px;position:relative;overflow:hidden;transition:background 0.3s;padding:0}
.pcard:hover .pcard-img{background:var(--bg3)}
.pcard-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,0.15));opacity:0;transition:opacity 0.3s}
.pcard:hover .pcard-img::after{opacity:1}
.pcard-photo{width:100%;height:100%;object-fit:cover;position:relative;z-index:1;transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)}
.pcard:hover .pcard-photo{transform:scale(1.07)}
.pcard-emoji{transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);display:block;position:relative;z-index:1}
.pcard:hover .pcard-emoji{transform:scale(1.15) translateY(-4px)}
.pbadge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:var(--r3);z-index:2}
.pbadge-new{background:rgba(45,122,72,0.1);color:#1f7a48;border:1px solid rgba(45,122,72,0.25)}
.pbadge-sale{background:rgba(192,57,43,0.1);color:#c0392b;border:1px solid rgba(192,57,43,0.25)}
.pbadge-hot{background:rgba(154,111,46,0.1);color:var(--gold);border:1px solid rgba(154,111,46,0.25)}
.wish-btn{position:absolute;top:10px;right:10px;background:rgba(250,248,244,0.85);border:1px solid var(--border2);color:var(--text3);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all 0.25s;z-index:2}
.wish-btn:hover{transform:scale(1.15)}
.wish-btn.on{color:#e06b6b;border-color:rgba(224,107,107,0.4);animation:heartPop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.quick-add{position:absolute;bottom:0;left:0;right:0;background:rgba(154,111,46,0.92);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:10px;text-align:center;transform:translateY(100%);transition:transform 0.3s ease;cursor:pointer;border:none;z-index:3}
.pcard:hover .quick-add{transform:translateY(0)}
.pcard-body{padding:1rem 1rem 1.1rem}
.pcard-cat{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.pcard-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.3}
.stars-row{display:flex;gap:1px;margin-bottom:8px}
.star{font-size:11px;color:var(--text3);transition:color 0.1s}
.star.on{color:var(--gold)}
.pcard-price{display:flex;align-items:baseline;gap:8px}
.price-cur{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--gold)}
.price-old{font-size:13px;color:var(--text3);text-decoration:line-through}
.price-save{font-size:10px;color:#c0392b;background:rgba(192,57,43,0.1);padding:2px 8px;border-radius:var(--r3);font-weight:600;letter-spacing:0.06em}

/* CATALOG CONTROLS */
.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.search-box{position:relative;flex:1;max-width:280px}
.search-box input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px 10px 40px;border-radius:var(--r3);outline:none;transition:all 0.25s}
.search-box input:focus{border-color:var(--gold3);background:var(--bg4);box-shadow:0 0 0 3px rgba(154,111,46,0.1)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:15px}
.sort-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 16px;border-radius:var(--r3);outline:none;cursor:pointer;transition:all 0.25s}
.sort-sel:focus{border-color:var(--gold3)}
.sort-sel option{background:var(--bg3)}

/* DETAIL PAGE */
.detail-wrap{padding:2rem 2.5rem;max-width:1000px;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;padding:0 0 2rem;transition:all 0.2s}
.back:hover{color:var(--gold);transform:translateX(-3px)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
@media(max-width:640px){.detail-grid{grid-template-columns:1fr}}
.detail-img-main{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:130px;
  transition:transform 0.4s ease;position:relative;overflow:hidden}
.detail-img-main::before{content:'';position:absolute;inset:-50%;background:conic-gradient(from 0deg,transparent,rgba(154,111,46,0.05),transparent);animation:slowSpin 12s linear infinite}
@keyframes slowSpin{to{transform:rotate(360deg)}}
.detail-img-main:hover{transform:scale(1.02)}
.thumbs{display:flex;gap:8px;margin-top:10px}
.thumb{width:64px;height:64px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.2s}
.thumb:hover,.thumb.active{border-color:var(--gold);transform:scale(1.05)}
.detail-cat{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.detail-name{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;line-height:1.1;margin-bottom:14px}
.detail-price{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:20px;display:flex;align-items:baseline;gap:14px}
.detail-price .op{font-size:1.3rem;color:var(--text3);text-decoration:line-through}
.detail-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin:1.5rem 0}
.meta-cell{background:var(--bg2);padding:14px 12px;text-align:center}
.meta-l{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:4px}
.meta-v{font-size:14px;font-weight:500}
.qty-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem}
.qty-btn{width:38px;height:38px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.qty-btn:hover{border-color:var(--gold);color:var(--gold);transform:scale(1.1)}
.qty-n{width:50px;text-align:center;font-size:17px;font-weight:500}
.add-to-cart{flex:1;background:var(--gold);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:14px 20px;border-radius:var(--r);cursor:pointer;position:relative;overflow:hidden;transition:all 0.2s;letter-spacing:0.08em;text-transform:uppercase}
.add-to-cart::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,0.25);border-radius:50%;transform:translate(-50%,-50%);transition:width 0.5s,height 0.5s,opacity 0.5s}
.add-to-cart:active::after{width:200px;height:200px;opacity:0}
.add-to-cart:hover{background:var(--gold2);transform:translateY(-1px)}
.detail-tabs{display:flex;gap:2px;background:var(--bg2);padding:4px;border-radius:var(--r2);margin-bottom:1.25rem}
.dtab{flex:1;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px;border-radius:var(--r);cursor:pointer;transition:all 0.2s}
.dtab.active{background:var(--bg4);color:var(--text)}
.tab-panel{animation:tabFade 0.3s ease;min-height:80px}
@keyframes tabFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CART */
.cart-wrap{max-width:700px;margin:0 auto;padding:2rem 2.5rem}
.cart-title{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:2rem}
.cart-empty{text-align:center;padding:5rem 2rem}
.empty-icon{font-size:72px;margin-bottom:1rem;animation:floatIcon 3s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.citem{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.1rem;display:grid;grid-template-columns:64px 1fr auto;gap:1rem;align-items:center;
  animation:slideInLeft 0.4s cubic-bezier(0.22,1,0.36,1) both;
  transition:border-color 0.2s}
.citem:hover{border-color:var(--border2)}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.citem-img{width:64px;height:64px;background:var(--bg3);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:30px}
.citem-name{font-size:15px;font-weight:500;margin-bottom:3px}
.citem-sub{font-size:12px;color:var(--text3)}
.citem-price{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);text-align:right}
.citem-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;transition:all 0.2s;display:block;text-align:right;margin-top:4px}
.citem-del:hover{color:var(--danger);transform:scale(1.15)}
.cart-summary{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;margin-top:1.5rem}
.sumrow{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;color:var(--text2)}
.sumrow.total{border-top:1px solid var(--border);margin-top:10px;padding-top:18px;font-size:17px;font-weight:500;color:var(--text)}
.sumrow.total .val{font-family:'Playfair Display',serif;color:var(--gold);font-size:22px}
.checkout-btn{width:100%;background:var(--gold);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:16px;border-radius:var(--r);cursor:pointer;margin-top:1rem;letter-spacing:0.08em;text-transform:uppercase;position:relative;overflow:hidden;transition:all 0.2s}
.checkout-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.5s}
.checkout-btn:hover::before{left:100%}
.checkout-btn:hover{background:var(--gold2)}

/* ABOUT */
.about-wrap{max-width:720px;margin:0 auto;padding:3rem 2.5rem}
.about-hero{padding:3rem 0;position:relative}
.about-name{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,6vw,3.5rem);font-weight:700;line-height:1.1;margin-bottom:1.5rem}
.about-name em{color:var(--gold)}
.value-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:2.5rem 0}
.val-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;text-align:center;
  transition:all 0.3s cubic-bezier(0.34,1.2,0.64,1)}
.val-card:hover{transform:translateY(-5px);border-color:var(--gold3)}
.val-icon{font-size:36px;margin-bottom:10px;display:block;transition:transform 0.3s}
.val-card:hover .val-icon{transform:scale(1.15) rotate(-5deg)}
.val-title{font-size:14px;font-weight:600;margin-bottom:6px}
.val-desc{font-size:13px;color:var(--text3);line-height:1.5}
.nl-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.75rem;display:flex;gap:1rem;align-items:center}
.nl-icon{font-size:42px;flex-shrink:0}
.nl-form{display:flex;gap:8px;margin-top:10px}
.nl-input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 14px;border-radius:var(--r);outline:none;transition:all 0.25s}
.nl-input:focus{border-color:var(--gold3);box-shadow:0 0 0 3px rgba(154,111,46,0.1)}
.nl-btn{background:var(--gold);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;padding:10px 18px;border-radius:var(--r);cursor:pointer;transition:all 0.2s;letter-spacing:0.06em}
.nl-btn:hover{background:var(--gold2);transform:translateY(-1px)}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--bg3);border:1px solid var(--border2);border-left:3px solid var(--gold2);color:var(--text);padding:14px 20px;border-radius:var(--r);font-size:14px;z-index:9000;
  animation:toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1),toastOut 0.35s 2.3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(30px) scale(0.9)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}

/* LOADING RIPPLE */
.ripple{position:fixed;pointer-events:none;border-radius:50%;background:rgba(154,111,46,0.1);z-index:500;transform:translate(-50%,-50%) scale(0);animation:rippleAnim 0.6s ease-out forwards}
@keyframes rippleAnim{to{transform:translate(-50%,-50%) scale(4);opacity:0}}

footer{padding:2rem 2.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;color:var(--text3);font-size:12px;margin-top:auto}
footer .fl{font-family:'Playfair Display',serif;color:var(--gold);font-size:16px}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="cursor-dot" id="cdot"></div>
<div class="cursor-ring" id="cring"></div>

<div id="app">
<nav id="nav">
  <div class="logo" onclick="go('home')">PAVAN'S<span> STORE</span></div>
  <div class="nav-links">
    <button class="nav-link active" id="nl-home" onclick="go('home')">Home</button>
    <button class="nav-link" id="nl-catalog" onclick="go('catalog')">Catalog</button>
    <button class="nav-link" id="nl-about" onclick="go('about')">About</button>
  </div>
  <button class="nav-cart" id="nav-cart" onclick="go('cart')" title="Cart">
    🛒<span class="cart-count" id="cc">0</span>
  </button>
</nav>
<main id="main"></main>
<footer><div class="fl">PAVAN'S STORE</div><p>© 2025 Pavan's Store · Production Capstone</p></footer>
</div>

<script>
const PRODUCTS=[
  {id:1,name:"Noir Ceramic Vessel",cat:"Home Decor",price:89,old:null,img:"https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?w=600&q=80",r:5,badge:"new",desc:"Hand-thrown stoneware with a matte obsidian glaze. Each piece is unique, fired at 1280°C for unmatched durability. A modern heirloom for the discerning home.",w:"640g",mat:"Stoneware",org:"Portugal",stock:12},
  {id:2,name:"Linen Cloud Throw",cat:"Textiles",price:145,old:195,img:"https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=600&q=80",r:4,badge:"sale",desc:"Stonewashed European linen in natural undyed hues. Impossibly soft with every wash, pre-washed for immediate comfort. 200×130cm.",w:"820g",mat:"100% Linen",org:"Lithuania",stock:8},
  {id:3,name:"Walnut Serving Board",cat:"Kitchen",price:68,old:null,img:"https://images.unsplash.com/photo-1577219491135-ce391730fb2c?w=600&q=80",r:5,badge:"hot",desc:"Sustainably sourced American black walnut with food-safe danish oil finish. Natural grain pattern varies per piece.",w:"890g",mat:"Black Walnut",org:"USA",stock:20},
  {id:4,name:"Amber Glass Carafe",cat:"Kitchen",price:52,old:null,img:"https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=600&q=80",r:4,badge:null,desc:"Mouth-blown amber borosilicate glass with a cork stopper. Heat and cold resistant. Perfect for cold brew or wildflowers. 1L.",w:"480g",mat:"Borosilicate Glass",org:"Czech Republic",stock:15},
  {id:5,name:"Merino Knit Cushion",cat:"Textiles",price:112,old:140,img:"https://images.unsplash.com/photo-1584100936595-c0654b55a2e2?w=600&q=80",r:5,badge:"sale",desc:"100% extra-fine merino in a chunky lattice knit. Removable cover with hidden zip. Insert included. 50×50cm.",w:"720g",mat:"Merino Wool",org:"New Zealand",stock:6},
  {id:6,name:"Brass Candleholder",cat:"Home Decor",price:38,old:null,img:"https://images.unsplash.com/photo-1603905620950-b9a23a59e10b?w=600&q=80",r:4,badge:"new",desc:"Solid unlacquered brass with a brushed finish. Will patina beautifully over time. Fits standard taper candles. Set of 3.",w:"340g",mat:"Unlacquered Brass",org:"India",stock:25},
  {id:7,name:"Smoked Oak Tray",cat:"Home Decor",price:95,old:null,img:"https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=600&q=80",r:5,badge:null,desc:"Steam-smoked European oak with a subtle rich grain. Natural beeswax finish. 40×24cm.",w:"1.1kg",mat:"Smoked Oak",org:"Denmark",stock:9},
  {id:8,name:"Porcelain Espresso Set",cat:"Kitchen",price:76,old:98,img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80",r:5,badge:"sale",desc:"Ultra-thin bone porcelain with a warm ivory glaze. Set of 4 cups and saucers, 80ml each. Dishwasher safe.",w:"560g",mat:"Bone Porcelain",org:"Japan",stock:11},
  {id:9,name:"Woven Seagrass Basket",cat:"Storage",price:44,old:null,img:"https://images.unsplash.com/photo-1595374023935-e8e3c4c2d88c?w=600&q=80",r:4,badge:"new",desc:"Hand-woven natural seagrass with leather handles. Naturally antibacterial. Medium 45×30cm.",w:"700g",mat:"Seagrass & Leather",org:"Vietnam",stock:18},
  {id:10,name:"Beeswax Pillar Candle",cat:"Scent",price:29,old:null,img:"https://images.unsplash.com/photo-1602607553645-ad0e5e57d72b?w=600&q=80",r:5,badge:null,desc:"Pure filtered beeswax with a cotton wick. Burns 60+ hours with a natural honey scent. No additives. 8×15cm pillar.",w:"280g",mat:"Pure Beeswax",org:"France",stock:30},
  {id:11,name:"Iron Wall Hook Set",cat:"Storage",price:58,old:75,img:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80",r:4,badge:"sale",desc:"Hand-forged blackened iron in a simple arched form. Set of 5 with mounting hardware. 8kg capacity per hook.",w:"920g",mat:"Blackened Iron",org:"Spain",stock:14},
  {id:12,name:"Velvet Throw Pillow",cat:"Textiles",price:66,old:null,img:"https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=600&q=80",r:5,badge:"hot",desc:"Deep-pile velvet in jewel tones. Feather-down insert. Hidden zipper. 45×45cm. Spot clean.",w:"620g",mat:"Cotton Velvet",org:"Italy",stock:22},
];

const CATS=["All","Home Decor","Textiles","Kitchen","Storage","Scent"];
let S={route:'home',cart:[],wish:[],search:'',cat:'All',sort:'featured',pid:null,qty:1,tab:'desc'};

function cartQty(){return S.cart.reduce((a,x)=>a+x.qty,0)}
function cartTotal(){return S.cart.reduce((a,x)=>a+x.qty*x.price,0)}

function addCart(id,qty=1){
  const p=PRODUCTS.find(x=>x.id===id);
  const ex=S.cart.find(x=>x.id===id);
  if(ex)ex.qty+=qty;
  else S.cart.push({...p,qty});
  S.qty=1;
  updateBadge(true);
  toast('✓  Added to cart — '+p.name);
  render();
}

function removeCart(id){
  S.cart=S.cart.filter(x=>x.id!==id);
  updateBadge(false);
  render();
}

function toggleWish(id){
  if(S.wish.includes(id))S.wish=S.wish.filter(x=>x!==id);
  else S.wish.push(id);
  render();
}

function updateBadge(bump){
  const el=document.getElementById('cc');
  if(!el)return;
  el.textContent=cartQty();
  if(bump){el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump')}
}

function go(route,id,e){
  S.route=route;
  if(id!=null)S.pid=id;
  S.qty=1;S.tab='desc';
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  const nl=document.getElementById('nl-'+route);
  if(nl)nl.classList.add('active');
  if(e){
    const r=document.createElement('div');
    r.className='ripple';
    r.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:60px;height:60px`;
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),700);
  }
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

function starsHTML(r){
  return Array.from({length:5},(_,i)=>`<span class="star${i<r?' on':''}">★</span>`).join('');
}

function filtered(){
  let p=[...PRODUCTS];
  if(S.cat!=='All')p=p.filter(x=>x.cat===S.cat);
  if(S.search)p=p.filter(x=>x.name.toLowerCase().includes(S.search.toLowerCase())||x.cat.toLowerCase().includes(S.search.toLowerCase()));
  if(S.sort==='asc')p.sort((a,b)=>a.price-b.price);
  else if(S.sort==='desc')p.sort((a,b)=>b.price-a.price);
  else if(S.sort==='rating')p.sort((a,b)=>b.r-a.r);
  return p;
}

function pcard(p,delay=0){
  const inCart=S.cart.find(x=>x.id===p.id);
  const liked=S.wish.includes(p.id);
  return`<div class="pcard" style="animation-delay:${delay}ms" onclick="go('detail',${p.id},event)">
    <div class="pcard-img">
      ${p.badge?`<span class="pbadge pbadge-${p.badge}">${p.badge}</span>`:''}
      <button class="wish-btn${liked?' on':''}" onclick="event.stopPropagation();toggleWish(${p.id})">${liked?'♥':'♡'}</button>
      <img class="pcard-photo" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
      <span class="pcard-emoji-fallback" style="display:none;font-size:60px;width:100%;height:100%;align-items:center;justify-content:center">🛍</span>
      <button class="quick-add" onclick="event.stopPropagation();addCart(${p.id})">Quick Add</button>
    </div>
    <div class="pcard-body">
      <div class="pcard-cat">${p.cat}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="stars-row">${starsHTML(p.r)}</div>
      <div class="pcard-price">
        <span class="price-cur">$${p.price}</span>
        ${p.old?`<span class="price-old">$${p.old}</span><span class="price-save">−$${p.old-p.price}</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderHome(){
  const featured=PRODUCTS.filter(p=>p.badge);
  return`<div class="page">
    <div class="hero">
      <div class="hero-orb"></div>
      <div class="hero-ring"></div><div class="hero-ring"></div><div class="hero-ring"></div>
      <div style="position:relative;z-index:1">
        <div class="hero-eyebrow">New Collection · 2025</div>
        <h1 class="hero-title">Objects of<br><em>Quiet Luxury</em></h1>
        <p class="hero-sub">Thoughtfully sourced homeware and objects that age beautifully and mean something.</p>
        <button class="hero-cta" onclick="go('catalog',null,event)">Explore Collection →</button>
        <div class="hero-stats">
          <div><div class="stat-num">12+</div><div class="stat-lbl">Curated Pieces</div></div>
          <div><div class="stat-num">8</div><div class="stat-lbl">Countries</div></div>
          <div><div class="stat-num">100%</div><div class="stat-lbl">Natural Materials</div></div>
        </div>
      </div>
    </div>
    <div class="cats-wrap">
      ${CATS.map(c=>`<div class="cat-pill${S.cat===c?' active':''}" onclick="S.cat='${c}';go('catalog',null,event)">${c}</div>`).join('')}
    </div>
    <div style="padding:0 2.5rem 3rem">
      <div class="section-title">Featured Pieces <span class="count">${featured.length} items</span></div>
      <div class="product-grid">${featured.map((p,i)=>pcard(p,i*60)).join('')}</div>
    </div>
  </div>`;
}

function renderCatalog(){
  const prods=filtered();
  return`<div class="page">
    <div class="cats-wrap">
      ${CATS.map(c=>`<div class="cat-pill${S.cat===c?' active':''}" onclick="S.cat='${c}';render()">${c}</div>`).join('')}
    </div>
    <div style="padding:0 2.5rem 3rem">
      <div class="ctrl-row">
        <div class="section-title" style="margin:0">All Products <span class="count">${prods.length} items</span></div>
        <div style="display:flex;gap:10px;align-items:center">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search…" value="${S.search}" oninput="S.search=this.value;render()">
          </div>
          <select class="sort-sel" onchange="S.sort=this.value;render()">
            <option value="featured"${S.sort==='featured'?' selected':''}>Featured</option>
            <option value="asc"${S.sort==='asc'?' selected':''}>Price: Low–High</option>
            <option value="desc"${S.sort==='desc'?' selected':''}>Price: High–Low</option>
            <option value="rating"${S.sort==='rating'?' selected':''}>Top Rated</option>
          </select>
        </div>
      </div>
      ${prods.length
        ?`<div class="product-grid">${prods.map((p,i)=>pcard(p,i*40)).join('')}</div>`
        :`<div style="text-align:center;padding:5rem 2rem;color:var(--text3)"><div style="font-size:48px;margin-bottom:1rem">🔍</div><p>No results for "${S.search}"</p></div>`}
    </div>
  </div>`;
}

function renderDetail(){
  const p=PRODUCTS.find(x=>x.id===S.pid);
  if(!p)return`<div style="padding:3rem;text-align:center;color:var(--text3)">Product not found.</div>`;
  const liked=S.wish.includes(p.id);
  const inCart=S.cart.find(x=>x.id===p.id);
  const qty=S.qty;
  const tabs={
    desc:`<p style="color:var(--text2);line-height:1.8;font-size:15px">${p.desc}</p>`,
    details:`<div style="font-size:14px;color:var(--text2)">
      ${[['Weight',p.w],['Material',p.mat],['Origin',p.org],['In Stock',p.stock+' units'],['Rating',p.r+'/5 stars']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text3)">${l}</span><span>${v}</span></div>`).join('')}
    </div>`,
    shipping:`<p style="color:var(--text2);font-size:14px;line-height:1.8">Free shipping on orders over $150. Standard delivery 3–5 business days. Express 1–2 days available. 30-day returns accepted. Items must be in original condition.</p>`
  };
  const related=PRODUCTS.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,4);
  return`<div class="page">
    <div class="detail-wrap">
      <button class="back" onclick="go('catalog')">← Back</button>
      <div class="detail-grid">
        <div>
          <div class="detail-img-main" style="padding:0;overflow:hidden">
            <img src="${p.img}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r2);transition:transform 0.5s ease" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
          </div>
          <div class="thumbs">
            ${[0,1,2].map(i=>`<div class="thumb${i===0?' active':''}" onclick="document.querySelector('.detail-img-main img').style.filter=i===1?'brightness(1.05)':i===2?'saturate(1.2)':'none'" style="overflow:hidden;padding:0"><img src="${p.img}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r);opacity:${0===i?1:0.65};transition:opacity 0.2s"></div>`).join('')}
          </div>
        </div>
        <div>
          <div class="detail-cat">${p.cat} ${p.badge?`<span class="pbadge pbadge-${p.badge}" style="margin-left:8px">${p.badge}</span>`:''}</div>
          <h1 class="detail-name">${p.name}</h1>
          <div style="display:flex;gap:4px;margin-bottom:14px;font-size:15px">${starsHTML(p.r)} <span style="color:var(--text3);font-size:13px;margin-left:6px">(${p.r*13} reviews)</span></div>
          <div class="detail-price">$${p.price}${p.old?`<span class="op">$${p.old}</span>`:''}</div>
          <div class="detail-meta">
            <div class="meta-cell"><div class="meta-l">Origin</div><div class="meta-v">${p.org}</div></div>
            <div class="meta-cell"><div class="meta-l">Material</div><div class="meta-v" style="font-size:12px">${p.mat}</div></div>
            <div class="meta-cell"><div class="meta-l">Stock</div><div class="meta-v" style="color:${p.stock<10?'#c0392b':'#2d7a48'}">${p.stock<10?'Low':'OK'}</div></div>
          </div>
          <div class="qty-wrap">
            <button class="qty-btn" onclick="S.qty=Math.max(1,S.qty-1);render()">−</button>
            <div class="qty-n">${qty}</div>
            <button class="qty-btn" onclick="S.qty=Math.min(${p.stock},S.qty+1);render()">+</button>
            <button class="add-to-cart" onclick="addCart(${p.id},${qty})">${inCart?'✓ In Cart':'Add to Cart'}</button>
            <button class="wish-btn${liked?' on':''}" onclick="toggleWish(${p.id})" style="position:static;flex-shrink:0">${liked?'♥':'♡'}</button>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:1.5rem">🚚 Free shipping over $150 · 30-day returns · Secure checkout</div>
          <div class="detail-tabs">
            <button class="dtab${S.tab==='desc'?' active':''}" onclick="S.tab='desc';render()">Description</button>
            <button class="dtab${S.tab==='details'?' active':''}" onclick="S.tab='details';render()">Details</button>
            <button class="dtab${S.tab==='shipping'?' active':''}" onclick="S.tab='shipping';render()">Shipping</button>
          </div>
          <div class="tab-panel">${tabs[S.tab]||''}</div>
        </div>
      </div>
      ${related.length?`<div style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border)">
        <div class="section-title">You may also like</div>
        <div class="product-grid">${related.map((pp,i)=>pcard(pp,i*60)).join('')}</div>
      </div>`:''}`
  +`</div></div>`;
}

function renderCart(){
  const items=S.cart;
  return`<div class="page">
    <div class="cart-wrap">
      <div class="cart-title">Your Cart</div>
      ${!items.length?`<div class="cart-empty">
        <div class="empty-icon">🛒</div>
        <p style="color:var(--text2);margin-bottom:1.5rem">Your cart is empty</p>
        <button class="hero-cta" onclick="go('catalog',null,event)" style="font-size:12px">Browse Collection</button>
      </div>`:`
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem">
        ${items.map((it,i)=>`<div class="citem" style="animation-delay:${i*60}ms">
<div class="citem-img" style="overflow:hidden;padding:0"><img src="${it.img}" alt="${it.name}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r)"></div>
          <div><div class="citem-name">${it.name}</div><div class="citem-sub">${it.cat} · Qty: ${it.qty}</div></div>
          <div>
            <div class="citem-price">$${it.price*it.qty}</div>
            <button class="citem-del" onclick="removeCart(${it.id})">✕</button>
          </div>
        </div>`).join('')}
      </div>
      <div class="cart-summary">
        <div class="sumrow"><span>Subtotal (${cartQty()} items)</span><span>$${cartTotal()}</span></div>
        <div class="sumrow"><span>Shipping</span><span>${cartTotal()>=150?'<span style="color:#5ebf89">Free</span>':'$12'}</span></div>
        <div class="sumrow"><span>Tax (8%)</span><span>$${(cartTotal()*0.08).toFixed(2)}</span></div>
        <div class="sumrow total"><span>Total</span><span class="val">$${(cartTotal()+(cartTotal()>=150?0:12)+cartTotal()*0.08).toFixed(2)}</span></div>
        <button class="checkout-btn" onclick="toast('🎉 Demo checkout — integrate Stripe or PayPal here!')">Proceed to Checkout →</button>
        <p style="text-align:center;font-size:11px;color:var(--text3);margin-top:10px">🔒 Secure · 30-day returns · Free shipping over $150</p>
      </div>`}
    </div>
  </div>`;
}

function renderAbout(){
  return`<div class="page">
    <div class="about-wrap">
      <div class="about-hero">
        <div style="font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem">Our Story</div>
        <h1 class="about-name">Made with care,<br><em>meant to last.</em></h1>
        <p style="color:var(--text2);line-height:1.8;margin-bottom:1.25rem;font-size:15px">Pavan's Store was founded on the belief that the objects we surround ourselves with should be honest about their materials, beautiful in their simplicity, and worthy of being passed down.</p>
        <p style="color:var(--text2);line-height:1.8;font-size:15px">Every item is tested in our homes first. If we wouldn't live with it, it doesn't make the cut.</p>
      </div>
      <div class="value-cards">
        ${[['🌿','Sustainable','Natural materials only. No plastic, no shortcuts.'],['🤝','Ethical','Fair wages for every maker in our network.'],['♻️','Circular','Take-back program for end-of-life products.']].map(([e,t,d])=>`<div class="val-card"><span class="val-icon">${e}</span><div class="val-title">${t}</div><div class="val-desc">${d}</div></div>`).join('')}
      </div>
      <div class="nl-box">
        <div class="nl-icon">📬</div>
        <div style="flex:1">
          <div style="font-weight:500;margin-bottom:4px">Join our circle</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:12px">New arrivals, maker stories, and private sales.</div>
          <div class="nl-form">
            <input class="nl-input" type="email" placeholder="your@email.com">
            <button class="nl-btn" onclick="toast('✓ You\'re on the list!')">Subscribe</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function render(){
  const m=document.getElementById('main');
  if(!m)return;
  const map={home:renderHome,catalog:renderCatalog,detail:renderDetail,cart:renderCart,about:renderAbout};
  m.innerHTML=(map[S.route]||renderHome)();
  updateBadge(false);
}

/* ── PARTICLES ── */
(function(){
  const c=document.getElementById('particles');
  const ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();
  window.addEventListener('resize',resize);
  for(let i=0;i<55;i++)pts.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    r:Math.random()*1.5+0.5,o:Math.random()*0.4+0.1
  });
  function frame(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(154,111,46,${p.o})`;
      ctx.fill();
    });
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(154,111,46,${0.06*(1-d/120)})`;
        ctx.lineWidth=0.5;ctx.stroke();
      }
    }));
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ── CUSTOM CURSOR ── */
(function(){
  const dot=document.getElementById('cdot');
  const ring=document.getElementById('cring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    dot.style.left=mx+'px';dot.style.top=my+'px';
  });
  function lerp(a,b,t){return a+(b-a)*t}
  (function tick(){
    rx=lerp(rx,mx,0.14);ry=lerp(ry,my,0.14);
    ring.style.left=rx+'px';ring.style.top=ry+'px';
    requestAnimationFrame(tick);
  })();
  document.addEventListener('mousedown',()=>{
    ring.style.width='28px';ring.style.height='28px';ring.style.borderColor='rgba(154,111,46,0.8)';
  });
  document.addEventListener('mouseup',()=>{
    ring.style.width='36px';ring.style.height='36px';ring.style.borderColor='rgba(154,111,46,0.4)';
  });
  document.querySelectorAll('button,a,.pcard,.cat-pill').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      ring.style.width='52px';ring.style.height='52px';
      ring.style.borderColor='rgba(154,111,46,0.6)';
    });
    el.addEventListener('mouseleave',()=>{
      ring.style.width='36px';ring.style.height='36px';
      ring.style.borderColor='rgba(154,111,46,0.4)';
    });
  });
})();

/* ── SCROLL REVEAL ── */
function setupReveal(){
  if(!('IntersectionObserver' in window))return;
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.style.opacity='1';
        e.target.style.transform='translateY(0)';
      }
    });
  },{threshold:0.1});
  document.querySelectorAll('.pcard,.val-card,.citem').forEach((el,i)=>{
    el.style.transition=`opacity 0.5s ${i*50}ms, transform 0.5s ${i*50}ms`;
    io.observe(el);
  });
}

const _render=render;
window.render=function(){_render();setTimeout(setupReveal,100)};

go('home');
</script>
